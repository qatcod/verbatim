<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>verbatim — engineering memory</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
<style>
  :root {
    --bg: #0a0a0c;
    --surface: #131316;
    --surface-2: #18181c;
    --surface-3: #1d1d22;
    --hover: #1a1a1f;
    --border: #1f1f24;
    --border-strong: #2a2a31;
    --text: #f4f4f5;
    --text-2: #c4c4c9;
    --text-3: #8a8a93;
    --text-4: #5f5f68;
    --accent: #a78bfa;
    --accent-2: #8b5cf6;
    --accent-soft: rgba(167, 139, 250, 0.12);
    --accent-rail: rgba(167, 139, 250, 0.85);
    --commitment: #a78bfa;
    --decision: #5eead4;
    --question: #fbbf24;
    --blocker: #fb7185;
    --shadow-lg: 0 24px 60px -12px rgba(0,0,0,0.5), 0 2px 6px rgba(0,0,0,0.3);
    --radius: 6px;
    --radius-lg: 10px;
  }

  [data-theme="light"] {
    --bg: #ffffff;
    --surface: #fafafa;
    --surface-2: #f5f5f6;
    --surface-3: #ececef;
    --hover: #f3f3f5;
    --border: #e9e9ec;
    --border-strong: #dcdce0;
    --text: #18181b;
    --text-2: #3f3f46;
    --text-3: #71717a;
    --text-4: #a1a1aa;
    --accent: #7c3aed;
    --accent-2: #6d28d9;
    --accent-soft: rgba(124, 58, 237, 0.08);
    --accent-rail: rgba(124, 58, 237, 0.7);
    --commitment: #7c3aed;
    --decision: #0d9488;
    --question: #d97706;
    --blocker: #e11d48;
    --shadow-lg: 0 20px 40px -16px rgba(20,20,30,0.16), 0 1px 3px rgba(20,20,30,0.06);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    font-feature-settings: "cv11", "ss01", "ss03", "cv02";
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    line-height: 1.45;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }

  #app { width: 100vw; height: 100vh; }

  /* ===== Scrollbars ===== */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-4); }

  /* ===== Shell ===== */
  .shell {
    display: grid;
    grid-template-columns: 232px 480px 1fr;
    height: 100vh;
    background: var(--bg);
  }

  /* ===== Sidebar ===== */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .brand {
    padding: 14px 16px 14px 14px;
    display: flex;
    align-items: center;
    gap: 9px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .brand:hover { background: var(--hover); }
  .brand-mark {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }
  .brand-word {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.025em;
    color: var(--text);
  }
  .brand-team {
    font-size: 11px;
    color: var(--text-3);
    font-weight: 500;
    margin-left: 2px;
  }
  .brand-team::before {
    content: "/";
    margin-right: 6px;
    color: var(--text-4);
    font-weight: 400;
  }
  .brand-chevron {
    margin-left: auto;
    color: var(--text-4);
  }

  .search-row {
    padding: 10px 10px 8px;
    display: flex;
    gap: 6px;
  }
  .search-btn {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-3);
    padding: 5px 9px;
    font: inherit;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }
  .search-btn:hover { border-color: var(--border-strong); color: var(--text-2); }
  .search-btn .kbd {
    margin-left: auto;
    color: var(--text-4);
    font-size: 10.5px;
    letter-spacing: 0.02em;
  }
  .icon-btn {
    width: 26px;
    height: 26px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-3);
    display: grid;
    place-items: center;
    cursor: pointer;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--border-strong); }

  .nav {
    padding: 6px 8px 12px;
    overflow-y: auto;
    flex: 1;
    min-height: 0;
  }
  .nav-section {
    padding: 10px 8px 4px;
    font-size: 10.5px;
    font-weight: 550;
    color: var(--text-4);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-section .plus {
    opacity: 0;
    color: var(--text-3);
    cursor: pointer;
    padding: 1px 2px;
  }
  .nav-section:hover .plus { opacity: 1; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 5px 8px;
    border-radius: 5px;
    color: var(--text-2);
    cursor: pointer;
    font-size: 13px;
    font-weight: 450;
    line-height: 1.4;
    user-select: none;
  }
  .nav-item:hover { background: var(--hover); color: var(--text); }
  .nav-item.active { background: var(--hover); color: var(--text); font-weight: 500; }
  .nav-item .ico {
    width: 14px;
    height: 14px;
    color: var(--text-3);
    flex-shrink: 0;
  }
  .nav-item.active .ico { color: var(--text); }
  .nav-item .count {
    margin-left: auto;
    color: var(--text-4);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
  }
  .nav-item.has-dot::after {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-left: auto;
  }
  .nav-item.has-dot .count { display: none; }
  .nav-item.team .ico {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-left: 4px;
    margin-right: 4px;
  }

  .sidebar-footer {
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .ingest-pulse {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #22c55e;
    position: relative;
    flex-shrink: 0;
  }
  .ingest-pulse::after {
    content: "";
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: #22c55e;
    opacity: 0.3;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(0.6); opacity: 0.3; }
    50% { transform: scale(1.2); opacity: 0; }
  }
  .ingest-label { font-size: 11.5px; color: var(--text-3); }
  .ingest-count { color: var(--text-2); font-weight: 500; font-variant-numeric: tabular-nums; }

  /* ===== List pane ===== */
  .list-pane {
    border-right: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .list-header {
    padding: 14px 20px 0;
    border-bottom: 1px solid var(--border);
  }
  .list-header-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .list-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.018em;
  }
  .list-meta {
    color: var(--text-3);
    font-size: 11.5px;
    font-variant-numeric: tabular-nums;
  }
  .filter-tabs {
    display: flex;
    gap: 2px;
    align-items: center;
    overflow-x: auto;
  }
  .filter-tab {
    padding: 7px 10px 9px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-3);
    cursor: pointer;
    border-bottom: 1.5px solid transparent;
    margin-bottom: -1px;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .filter-tab:hover { color: var(--text); }
  .filter-tab.active {
    color: var(--text);
    border-bottom-color: var(--text);
  }
  .filter-tab .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .filter-tab .ct {
    color: var(--text-4);
    font-variant-numeric: tabular-nums;
    font-weight: 450;
  }
  .filter-tab.active .ct { color: var(--text-3); }

  .toolbar {
    padding: 7px 20px;
    display: flex;
    gap: 6px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    color: var(--text-3);
    font-size: 11.5px;
  }
  .toolbar-chip {
    padding: 3px 7px 4px;
    border: 1px dashed var(--border-strong);
    border-radius: 4px;
    color: var(--text-3);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .toolbar-chip:hover { color: var(--text); border-color: var(--text-4); }
  .toolbar-chip.set {
    border-style: solid;
    border-color: var(--border-strong);
    color: var(--text-2);
    background: var(--surface);
  }
  .toolbar-chip.set strong { color: var(--text); font-weight: 500; }
  .toolbar-spacer { flex: 1; }
  .toolbar-sort {
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--text-3);
    cursor: pointer;
  }
  .toolbar-sort:hover { color: var(--text); }

  .list-scroll {
    overflow-y: auto;
    flex: 1;
    min-height: 0;
  }

  /* ===== List row ===== */
  .row {
    padding: 12px 20px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    display: grid;
    grid-template-columns: auto 1fr auto;
    column-gap: 12px;
    row-gap: 6px;
    align-items: start;
  }
  .row:hover { background: var(--surface); }
  .row.selected { background: var(--surface); }
  .row.selected::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--text);
  }
  .row.unread .row-summary { color: var(--text); font-weight: 500; }
  .row.unread::after {
    content: "";
    position: absolute;
    left: 8px;
    top: 18px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
  }

  .row-type {
    display: flex;
    align-items: center;
    gap: 6px;
    padding-top: 1px;
  }
  .type-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
  }
  .type-dot.commitment { background: var(--commitment); }
  .type-dot.decision { background: var(--decision); }
  .type-dot.question { background: var(--question); }
  .type-dot.blocker { background: var(--blocker); }

  .row-id {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 10.5px;
    color: var(--text-4);
    font-weight: 400;
    letter-spacing: -0.01em;
  }

  .row-summary {
    grid-column: 2;
    font-size: 13px;
    font-weight: 450;
    color: var(--text-2);
    line-height: 1.4;
    letter-spacing: -0.005em;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
  }

  .row-meta {
    grid-column: 3;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-3);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .avatar {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--surface-3);
    display: grid;
    place-items: center;
    color: var(--text-2);
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.01em;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .avatar.purple { background: #4c2d8a; color: #ddd6fe; border-color: #5b21b6; }
  .avatar.teal { background: #134e4a; color: #99f6e4; border-color: #115e59; }
  .avatar.rose { background: #7f1d1d; color: #fecaca; border-color: #991b1b; }
  .avatar.amber { background: #78350f; color: #fde68a; border-color: #92400e; }
  .avatar.blue { background: #1e3a8a; color: #bfdbfe; border-color: #1e40af; }
  .avatar.slate { background: #334155; color: #e2e8f0; border-color: #475569; }
  [data-theme="light"] .avatar.purple { background: #ede9fe; color: #5b21b6; border-color: #ddd6fe; }
  [data-theme="light"] .avatar.teal { background: #ccfbf1; color: #115e59; border-color: #99f6e4; }
  [data-theme="light"] .avatar.rose { background: #ffe4e6; color: #9f1239; border-color: #fecdd3; }
  [data-theme="light"] .avatar.amber { background: #fef3c7; color: #92400e; border-color: #fde68a; }
  [data-theme="light"] .avatar.blue { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; }
  [data-theme="light"] .avatar.slate { background: #e2e8f0; color: #334155; border-color: #cbd5e1; }

  .row-quote {
    grid-column: 1 / -1;
    margin-left: 14px;
    padding-left: 10px;
    border-left: 2px solid var(--border-strong);
    color: var(--text-3);
    font-size: 12px;
    font-style: italic;
    line-height: 1.4;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    letter-spacing: -0.002em;
  }
  .row.selected .row-quote { border-left-color: var(--accent-rail); color: var(--text-2); }
  .row-quote .attr {
    font-style: normal;
    color: var(--text-4);
    font-size: 11px;
    margin-left: 6px;
  }
  .row-quote .attr::before { content: "— "; }

  .row-foot {
    grid-column: 1 / -1;
    margin-left: 14px;
    display: flex;
    gap: 10px;
    align-items: center;
    color: var(--text-4);
    font-size: 11px;
  }
  .src {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    color: var(--text-3);
  }
  .src svg { width: 11px; height: 11px; }
  .row-foot .dot { width: 2px; height: 2px; border-radius: 50%; background: var(--text-4); }
  .row-foot .due { color: var(--text-3); }
  .row-foot .due.soon { color: var(--question); }
  .row-foot .due.overdue { color: var(--blocker); }
  .row-foot .status {
    padding: 1.5px 6px;
    border-radius: 3px;
    background: var(--surface-2);
    color: var(--text-2);
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.005em;
    border: 1px solid var(--border);
  }
  .row-foot .status.open { color: var(--text-3); }
  .row-foot .status.confirmed { color: #5eead4; background: rgba(94,234,212,0.08); border-color: rgba(94,234,212,0.18); }
  [data-theme="light"] .row-foot .status.confirmed { color: #0f766e; background: rgba(20,184,166,0.1); border-color: rgba(20,184,166,0.22); }

  /* ===== Detail pane ===== */
  .detail {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow-y: auto;
  }
  .detail-header {
    padding: 14px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 5;
  }
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 7px;
    color: var(--text-3);
    font-size: 12px;
    flex: 1;
  }
  .breadcrumb .sep { color: var(--text-4); }
  .breadcrumb .id { font-family: "JetBrains Mono", monospace; font-size: 11.5px; color: var(--text-2); }
  .header-actions { display: flex; gap: 6px; }
  .hdr-btn {
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-2);
    border-radius: 5px;
    padding: 5px 9px;
    font: inherit;
    font-size: 11.5px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .hdr-btn:hover { background: var(--surface); border-color: var(--border-strong); color: var(--text); }
  .hdr-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  [data-theme="light"] .hdr-btn.primary { color: #fff; }
  .hdr-btn.primary:hover { background: var(--accent-2); border-color: var(--accent-2); }
  .hdr-btn .kbd { color: var(--text-4); font-size: 10.5px; }
  .hdr-btn.primary .kbd { color: rgba(255,255,255,0.7); }

  .detail-body {
    padding: 22px 32px 56px;
    display: grid;
    grid-template-columns: 1fr 240px;
    gap: 32px 40px;
    max-width: 1080px;
  }

  .detail-main { min-width: 0; }

  .entity-eyebrow {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 550;
    margin-bottom: 12px;
  }
  .entity-eyebrow .type-dot { width: 7px; height: 7px; border-radius: 2px; }
  .entity-title {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.022em;
    line-height: 1.25;
    margin: 0 0 28px;
    color: var(--text);
    text-wrap: balance;
  }

  /* ===== Quote hero ===== */
  .quote-hero {
    position: relative;
    margin: 0 0 28px;
    padding: 18px 20px 18px 28px;
    background: var(--accent-soft);
    border-radius: var(--radius-lg);
    border: 1px solid rgba(167,139,250,0.18);
  }
  [data-theme="light"] .quote-hero { border-color: rgba(124,58,237,0.18); }
  .quote-hero::before {
    content: "";
    position: absolute;
    left: 0;
    top: 14px;
    bottom: 14px;
    width: 2.5px;
    border-radius: 2px;
    background: var(--accent);
  }
  .quote-hero-label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .quote-hero-label .lock {
    background: var(--accent);
    color: var(--bg);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 9.5px;
    letter-spacing: 0.04em;
    font-weight: 600;
  }
  [data-theme="light"] .quote-hero-label .lock { color: #fff; }
  .quote-hero-text {
    font-size: 17px;
    line-height: 1.45;
    color: var(--text);
    font-weight: 450;
    letter-spacing: -0.012em;
    font-style: italic;
    text-wrap: pretty;
  }
  .quote-hero-text q { quotes: "\201C" "\201D"; }
  .quote-hero-text q::before, .quote-hero-text q::after { color: var(--accent); font-weight: 500; font-style: normal; }
  .quote-hero-attr {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11.5px;
    color: var(--text-3);
    font-style: normal;
  }
  .quote-hero-attr .avatar { width: 16px; height: 16px; font-size: 9px; }
  .quote-hero-attr strong { color: var(--text-2); font-weight: 550; }
  .quote-hero-attr .sep { color: var(--text-4); }

  /* ===== Source context ===== */
  .section-h {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 600;
    color: var(--text-3);
    margin: 0 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-h .line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-h .src-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 7px 3px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-2);
    text-transform: none;
    letter-spacing: 0;
    font-size: 11px;
    font-weight: 500;
  }

  .slack-frame {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--surface);
    overflow: hidden;
    margin-bottom: 32px;
  }
  .slack-head {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-2);

  .slack-head .ch { color: var(--text-3); }
  .slack-head .ch::before { content: "#"; color: var(--text-4); margin-right: 1px; }
  .slack-head .members { margin-left: auto; color: var(--text-4); font-size: 11px; }

  .slack-msg {
    padding: 9px 16px 9px 16px;

    gap: 10px;

  .slack-msg.highlight {

  .slack-msg + .slack-msg.same { padding-top: 1px; }
  .slack-msg.same .av-slot { visibility: hidden; }
  .slack-msg.same .who { display: none; }
  .slack-msg .av-slot { display: grid; place-items: start center; padding-top: 2px; }
  .slack-msg .avatar { width: 28px; height: 28px; border-radius: 5px; font-size: 12px; }
  .slack-msg .who {
    display: flex;
    align-items: baseline;
    gap: 7px;
    margin-bottom: 1px;
  }
  .slack-msg .who strong {
    font-size: 13px;
    color: var(--text);
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .slack-msg .who .ts { color: var(--text-4); font-size: 11px; }
  .slack-msg .body {
    font-size: 13.5px;
    color: var(--text-2);
    line-height: 1.5;
    word-wrap: break-word;
  }
  .slack-msg.highlight .body { color: var(--text); }
  .slack-msg .body code {
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    background: var(--surface-3);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--text);
  }
  .slack-msg .body .mention {
    background: var(--accent-soft);
    color: var(--accent);
    padding: 0 3px;
    border-radius: 3px;

  }
  .reactions {
    display: flex;
    gap: 4px;
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .reaction {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 1px 6px 2px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-size: 11px;
    color: var(--text-2);
    cursor: pointer;
  }
  .reaction.mine { background: var(--accent-soft); border-color: rgba(167,139,250,0.3); color: var(--accent); }
  [data-theme="light"] .reaction.mine { border-color: rgba(124,58,237,0.3); }

  /* Verbatim's annotation inside the Slack frame */
  .verbatim-trace {
    margin: 0 16px 12px 54px;
    padding: 8px 10px 9px;
    background: var(--bg);
    border: 1px dashed rgba(167,139,250,0.32);

    align-items: center;
    gap: 9px;
    font-size: 11.5px;
    color: var(--text-3);
  }
  [data-theme="light"] .verbatim-trace { border-color: rgba(124,58,237,0.3); }
  .verbatim-trace .mini-mark { width: 13px; height: 13px; flex-shrink: 0; }
  .verbatim-trace strong { color: var(--text-2); font-weight: 550; }
  .verbatim-trace .arrow { color: var(--accent); }

  /* ===== Slack bot reply mock ===== */
  .bot-reply {
    margin: 0 14px 14px;
    padding: 12px 14px;
    border-radius: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
  }
  .bot-reply-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 12px;
  }
  .bot-reply-head .bot-av {
    width: 22px; height: 22px;
    border-radius: 5px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center;
  }
  .bot-reply-head strong { color: var(--text); font-weight: 600; font-size: 13px; }
  .bot-reply-head .app-tag {
    background: var(--surface-3);
    color: var(--text-3);
    font-size: 9.5px;
    padding: 1.5px 5px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 600;
  }
  .bot-reply-head .ts { color: var(--text-4); font-size: 11px; }
  .bot-reply-body { font-size: 13px; color: var(--text-2); line-height: 1.45; }
  .extraction-card {
    margin-top: 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface-2);
    padding: 12px 14px;
  }
  .extraction-card .ec-row {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 12px;
    font-size: 12px;
    padding: 3px 0;
  }
  .extraction-card .ec-label {
    color: var(--text-4);
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 0.06em;
    font-weight: 600;
    padding-top: 2px;
  }
  .extraction-card .ec-val { color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .ec-quote {
    font-style: italic;
    color: var(--text-2);
    border-left: 2px solid var(--accent);
    padding-left: 8px;
    font-size: 12.5px;
    line-height: 1.45;
  }
  .ec-actions {
    margin-top: 10px;
    display: flex;
    gap: 6px;
  }
  .ec-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-2);
    padding: 4px 9px;
    border-radius: 4px;
    font: inherit;
    font-size: 11.5px;
    font-weight: 500;
    cursor: pointer;
  }
  .ec-btn:hover { color: var(--text); border-color: var(--border-strong); }
  .ec-btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .ec-btn.primary:hover { opacity: 0.9; }

  /* ===== Detail right rail ===== */
  .detail-side {
    padding-top: 4px;
  }
  .side-block { margin-bottom: 26px; }
  .side-h {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-4);
    font-weight: 600;
    margin: 0 0 10px;
  }
  .side-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 12px;
    color: var(--text-2);
    border-bottom: 1px solid var(--border);
  }
  .side-row:last-child { border-bottom: none; }
  .side-row .k { color: var(--text-3); font-size: 11.5px; }
  .side-row .v { display: flex; align-items: center; gap: 6px; color: var(--text); font-weight: 450; }
  .side-row .v.muted { color: var(--text-3); font-weight: 400; }
  .confidence-bar {
    height: 4px;
    width: 56px;
    background: var(--surface-3);
    border-radius: 2px;
    overflow: hidden;
  }
  .confidence-bar > div { height: 100%; background: var(--accent); border-radius: 2px; }

  .linked-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    margin: 0 -8px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-2);
  }
  .linked-item:hover { background: var(--surface); }
  .linked-item .id { font-family: "JetBrains Mono", monospace; color: var(--text-4); font-size: 10.5px; }
  .linked-item .ltext {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .related-quote {
    margin: 0 -8px;
    padding: 8px 10px;
    border-radius: 5px;
    border-left: 2px solid var(--border-strong);
    font-style: italic;
    font-size: 11.5px;
    color: var(--text-3);
    line-height: 1.45;
    cursor: pointer;
  }
  .related-quote:hover { background: var(--surface); border-left-color: var(--accent-rail); color: var(--text-2); }
  .related-quote .ra { font-style: normal; color: var(--text-4); font-size: 11px; margin-top: 4px; display: block; }

  /* ===== Tweaks panel ===== */
  .tweaks {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 10px 12px;
    display: none;
    align-items: center;
    gap: 10px;
    box-shadow: var(--shadow-lg);
    z-index: 100;
    font-size: 12px;
  }
  .tweaks.open { display: flex; }
  .tweaks-title { color: var(--text-3); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
  .seg { display: inline-flex; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 2px; }
  .seg button {
    background: transparent;
    border: none;
    color: var(--text-3);
    padding: 4px 10px;
    border-radius: 3px;
    font: inherit;
    font-size: 11.5px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .seg button.active { background: var(--surface-3); color: var(--text); }
  .seg button svg { width: 12px; height: 12px; }
  .tweaks-x {
    background: transparent;
    border: none;
    color: var(--text-4);
    cursor: pointer;
    padding: 2px;
    display: grid;
    place-items: center;
  }
  .tweaks-x:hover { color: var(--text); }

  /* utility */
  .row-foot .sep-l { width: 1px; height: 9px; background: var(--border); margin: 0 1px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
  // Tweaks: dark/light only
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "dark"
  }/*EDITMODE-END*/;

  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    document.querySelectorAll('[data-tweak-theme]').forEach(b => {
      b.classList.toggle('active', b.dataset.tweakTheme === t);
    });
  }

  let edit_active = false;
  function setTheme(t) {
    applyTheme(t);
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { theme: t } }, '*'); } catch(e) {}
  }

  window.addEventListener('message', (e) => {
    const d = e.data || {};
    if (d.type === '__activate_edit_mode') {
      edit_active = true;
      const t = document.getElementById('tweaks-panel');
      if (t) t.classList.add('open');
    } else if (d.type === '__deactivate_edit_mode') {
      edit_active = false;
      const t = document.getElementById('tweaks-panel');
      if (t) t.classList.remove('open');
    }
  });

  document.addEventListener('DOMContentLoaded', () => {
    applyTheme(TWEAK_DEFAULTS.theme);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(e) {}
  });
</script>
